# Alembic configuration. The actual SQLAlchemy URL is read from the
# DATABASE_URL env var via env.py (created in Phase 1) so we do not commit
# credentials here.

[alembic]
script_location = alembic
prepend_sys_path = .
version_path_separator = os
output_encoding = utf-8

# sqlalchemy.url is intentionally left empty — env.py picks DATABASE_URL
# from the environment. Setting it here would shadow that and cause
# surprising behavior between dev/CI/prod.
sqlalchemy.url =

# Timestamped migration filenames keep ordering obvious during reviews.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(hour).2d%%(minute).2d_%%(slug)s

[post_write_hooks]
hooks = ruff
ruff.type = console_scripts
ruff.entrypoint = ruff
ruff.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
