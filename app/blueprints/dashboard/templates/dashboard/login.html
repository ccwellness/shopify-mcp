<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Sign in — Shopify Connector</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600;700;800;900&family=Geist+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="{{ url_for('dashboard.static', filename='css/tokens.css') }}">
  <link rel="stylesheet" href="{{ url_for('dashboard.static', filename='css/ensemble.css') }}">
  <style>
    main.login {
      max-width: 28rem;
      margin: 0 auto;
      padding: var(--sp-6);
    }
    main.login form {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-lg);
      padding: var(--sp-6);
    }
    main.login button { width: 100%; margin-top: var(--sp-4); }
  </style>
</head>
<body>
  <main class="login">
    <div class="ensemble-hero">
      <div class="ensemble-wordmark">shopify connector</div>
      <div class="ensemble-underbar"></div>
      <div class="ensemble-tagline">Multi-store Operations Platform</div>
    </div>

    {% if errors %}
      <div class="warning">
        {% for err in errors %}<p>{{ err }}</p>{% endfor %}
      </div>
    {% endif %}

    <form method="post" action="{{ url_for('dashboard.login_submit') }}">
      <label>
        API token
        <input type="password" name="token" required autofocus
               placeholder="ccsc_..." autocomplete="off">
      </label>
      {% if next_url %}
        <input type="hidden" name="next" value="{{ next_url }}">
      {% endif %}
      <button type="submit">Sign in</button>
    </form>

    <footer style="text-align: center; margin-top: var(--sp-5);">
      <small>Mint a token via the CLI: <code>flask api mint-token --name=&lt;you&gt;</code></small>
    </footer>
  </main>
</body>
</html>
